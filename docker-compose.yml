name: cash-flow

services:
  # ────────────────────────── INFRA ──────────────────────────
  postgres-transactions:
    image: postgres:16-alpine
    container_name: cf-postgres-transactions
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: transactions_user
      POSTGRES_PASSWORD: transactions_pwd
    ports:
      - "5433:5432"
    volumes:
      - postgres-transactions-data:/var/lib/postgresql/data
      - ./infra/postgres/init-transactions.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transactions_user -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-reporting:
    image: postgres:16-alpine
    container_name: cf-postgres-reporting
    environment:
      POSTGRES_DB: reporting_db
      POSTGRES_USER: reporting_user
      POSTGRES_PASSWORD: reporting_pwd
    ports:
      - "5434:5432"
    volumes:
      - postgres-reporting-data:/var/lib/postgresql/data
      - ./infra/postgres/init-reporting.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporting_user -d reporting_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cf-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cf-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ────────────────────── OBSERVABILIDADE ──────────────────────
  seq:
    image: datalust/seq:latest
    container_name: cf-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: cf-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

  prometheus:
    image: prom/prometheus:latest
    container_name: cf-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: cf-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ────────────────────────── APPS ──────────────────────────
  transactions-api:
    build:
      context: .
      dockerfile: src/Transactions/Transactions.Api/Dockerfile
    container_name: cf-transactions-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres-transactions;Port=5432;Database=transactions_db;Username=transactions_user;Password=transactions_pwd
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Password: guest
      Otel__OtlpEndpoint: http://jaeger:4317
      Serilog__Seq__ServerUrl: http://seq:80
    ports:
      - "5001:8080"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  transactions-worker:
    build:
      context: .
      dockerfile: src/Transactions/Transactions.Worker/Dockerfile
    container_name: cf-transactions-worker
    environment:
      ConnectionStrings__Postgres: Host=postgres-transactions;Port=5432;Database=transactions_db;Username=transactions_user;Password=transactions_pwd
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Password: guest
      Otel__OtlpEndpoint: http://jaeger:4317
      Serilog__Seq__ServerUrl: http://seq:80
      Outbox__PollIntervalMs: "500"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reporting-api:
    build:
      context: .
      dockerfile: src/Reporting/Reporting.Api/Dockerfile
    container_name: cf-reporting-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres-reporting;Port=5432;Database=reporting_db;Username=reporting_user;Password=reporting_pwd
      ConnectionStrings__Redis: redis:6379
      Otel__OtlpEndpoint: http://jaeger:4317
      Serilog__Seq__ServerUrl: http://seq:80
    ports:
      - "5002:8080"
    depends_on:
      postgres-reporting:
        condition: service_healthy
      redis:
        condition: service_healthy

  reporting-worker:
    build:
      context: .
      dockerfile: src/Reporting/Reporting.Worker/Dockerfile
    container_name: cf-reporting-worker
    environment:
      ConnectionStrings__Postgres: Host=postgres-reporting;Port=5432;Database=reporting_db;Username=reporting_user;Password=reporting_pwd
      ConnectionStrings__Redis: redis:6379
      RabbitMq__Host: rabbitmq
      RabbitMq__User: guest
      RabbitMq__Password: guest
      Otel__OtlpEndpoint: http://jaeger:4317
      Serilog__Seq__ServerUrl: http://seq:80
    depends_on:
      postgres-reporting:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-transactions-data:
  postgres-reporting-data:
  rabbitmq-data:
