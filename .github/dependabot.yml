version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      otel:
        patterns: ["OpenTelemetry*"]
      ef-core:
        patterns: ["Microsoft.EntityFrameworkCore*", "Npgsql.EntityFrameworkCore*"]
      masstransit:
        patterns: ["MassTransit*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/src/Lancamentos/Lancamentos.Api"
    schedule:
      interval: "monthly"
