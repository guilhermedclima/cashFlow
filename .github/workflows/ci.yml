name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'

jobs:
  build:
    name: Build + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore CashFlow.sln

      - name: Build
        run: dotnet build CashFlow.sln --configuration Release --no-restore

      - name: Unit Tests
        run: |
          dotnet test CashFlow.sln \
            --configuration Release \
            --no-build \
            --filter "Category=Unit" \
            --logger "trx;LogFileName=unit.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ./TestResults

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ./TestResults/**/coverage.cobertura.xml

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # No registry push; just validates the Dockerfiles build successfully.
      - name: Build Transactions.Api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Transactions/Transactions.Api/Dockerfile
          push: false
          tags: cashflow/transactions-api:ci

      - name: Build Transactions.Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Transactions/Transactions.Worker/Dockerfile
          push: false
          tags: cashflow/transactions-worker:ci

      - name: Build Reporting.Api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Reporting/Reporting.Api/Dockerfile
          push: false
          tags: cashflow/reporting-api:ci

      - name: Build Reporting.Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Reporting/Reporting.Worker/Dockerfile
          push: false
          tags: cashflow/reporting-worker:ci
