name: cash-flow-infra

# Infrastructure only — useful when running the apps directly on the host (dotnet run).

services:
  postgres-transactions:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transactions_db
      POSTGRES_USER: transactions_user
      POSTGRES_PASSWORD: transactions_pwd
    ports: ["5433:5432"]
    volumes:
      - postgres-transactions-data:/var/lib/postgresql/data
      - ./infra/postgres/init-transactions.sql:/docker-entrypoint-initdb.d/init.sql

  postgres-reporting:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reporting_db
      POSTGRES_USER: reporting_user
      POSTGRES_PASSWORD: reporting_pwd
    ports: ["5434:5432"]
    volumes:
      - postgres-reporting-data:/var/lib/postgresql/data
      - ./infra/postgres/init-reporting.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports: ["5672:5672", "15672:15672"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --save "" --appendonly no

  seq:
    image: datalust/seq:latest
    environment: { ACCEPT_EULA: "Y" }
    ports: ["5341:80"]

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment: { COLLECTOR_OTLP_ENABLED: "true" }
    ports: ["16686:16686", "4317:4317", "4318:4318"]

volumes:
  postgres-transactions-data:
  postgres-reporting-data:
